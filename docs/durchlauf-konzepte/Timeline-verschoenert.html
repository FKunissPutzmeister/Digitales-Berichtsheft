<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Abteilungsdurchlauf · Timeline (verschönert)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* App-Tokens (Light) */
    --pm-yellow:#FFC300; --pm-yellow-pale:#FFF6D6; --pm-yellow-darker:#B98900;
    --pm-grey-50:#F7F7F5; --pm-grey-100:#F0F0F0; --pm-grey-200:#E6E6E3;
    --pm-grey-300:#D6D6D3; --pm-grey-500:#8A8A88; --pm-grey-600:#4A4A4A;
    --pm-grey-700:#3A3A3A; --pm-grey-800:#2C2C2C; --pm-white:#FFFFFF;
    --today:#E5484D;
    --c1:#4F9D9A; --c2:#5B86C2; --c3:#5FAE72; --c4:#D8835A; --c5:#9B7BC4;
    --font-heading:'Libre Franklin',system-ui,sans-serif;
    --font-body:'Open Sans',system-ui,sans-serif;
    --day-px:30px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);background:#FAFAF8;color:var(--pm-grey-800);-webkit-font-smoothing:antialiased}
  .page{max-width:1320px;margin:0 auto;padding:40px 28px 70px}

  .page-header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:24px}
  .page-title{font-family:var(--font-heading);font-weight:800;font-size:clamp(26px,4vw,38px);letter-spacing:-.02em}
  .legend{display:flex;align-items:center;gap:18px;font-size:13px;color:var(--pm-grey-600)}
  .legend i{display:inline-block;width:14px;height:14px;border-radius:4px;vertical-align:-2px;margin-right:6px}

  /* ===== Panel-Rahmen um die scrollende Timeline ===== */
  .gantt-panel{background:var(--pm-white);border:1px solid var(--pm-grey-200);border-radius:18px;
               box-shadow:0 1px 2px rgba(0,0,0,.04),0 18px 44px rgba(0,0,0,.07);overflow:hidden}
  .gantt-scroll{overflow-x:auto;overflow-y:hidden}
  .gantt-scroll::-webkit-scrollbar{height:12px}
  .gantt-scroll::-webkit-scrollbar-track{background:var(--pm-grey-50)}
  .gantt-scroll::-webkit-scrollbar-thumb{background:var(--pm-grey-300);border-radius:99px;border:3px solid var(--pm-grey-50)}

  .gantt-grid{--num-days:365}

  /* ---- Kopf: Jahres-Label + Monats-/Tagesraster ---- */
  .gantt-header{display:flex;border-bottom:1px solid var(--pm-grey-200)}
  .gantt-header__name-col{width:240px;min-width:240px;flex-shrink:0;position:sticky;left:0;z-index:4;
        background:var(--pm-white);border-right:1px solid var(--pm-grey-200);
        display:flex;align-items:flex-end;padding:0 var(--sp,18px) 10px 22px;
        font-family:var(--font-heading);font-weight:800;font-size:20px;color:var(--pm-grey-800)}
  .gantt-header__timeline{flex:none;width:calc(var(--num-days) * var(--day-px))}
  .gantt-months{display:flex}
  .gantt-month{box-sizing:border-box;flex:none;padding:11px 0;text-align:center;
        font-family:var(--font-heading);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
        color:var(--pm-grey-700);border-right:1px solid var(--pm-grey-200);border-bottom:1px solid var(--pm-grey-100);
        white-space:nowrap;overflow:hidden}
  .gantt-month--q{border-left:2px solid var(--pm-grey-300)}
  .gantt-month.current{color:var(--pm-yellow-darker);background:var(--pm-yellow-pale)}
  .gantt-days{display:flex}
  .gantt-day{box-sizing:border-box;flex:0 0 var(--day-px);width:var(--day-px);padding:3px 0;text-align:center;
        font-size:10px;color:var(--pm-grey-500);border-right:1px solid var(--pm-grey-100)}
  .gantt-day--weekend{background:var(--pm-grey-50)}
  .gantt-day--month{border-left:2px solid var(--pm-grey-300)}
  .gantt-day.current{background:var(--pm-yellow-pale);color:var(--pm-yellow-darker);font-weight:700}

  /* ---- Körper: eine Zeile (Abteilungen) ---- */
  .gantt-row{display:flex;align-items:stretch;min-height:108px}
  .gantt-row__info{width:240px;min-width:240px;flex-shrink:0;position:sticky;left:0;z-index:3;
        background:var(--pm-white);border-right:1px solid var(--pm-grey-200);
        display:flex;align-items:center;justify-content:center;text-align:center;padding:0 18px}
  .gantt-row__name{font-family:var(--font-heading);font-weight:700;font-size:18px;color:var(--pm-grey-800)}
  .gantt-row__name small{display:block;font-family:var(--font-body);font-weight:400;font-size:12px;color:var(--pm-grey-500);margin-top:3px}

  .gantt-row__timeline{width:calc(var(--num-days) * var(--day-px));flex:none;position:relative;
        height:108px;display:flex;align-items:center}
  /* Hintergrund-Raster: Tageslinien + 7-Tage-Rhythmus (wie in der App) */
  .gantt-row__timeline::before{content:'';position:absolute;inset:0;pointer-events:none;
    background-image:
      repeating-linear-gradient(to right,transparent 0,transparent calc(var(--day-px) * 7 - 1px),
        var(--pm-grey-200) calc(var(--day-px) * 7 - 1px),var(--pm-grey-200) calc(var(--day-px) * 7)),
      repeating-linear-gradient(to right,transparent 0,transparent calc(var(--day-px) - 1px),
        var(--pm-grey-50) calc(var(--day-px) - 1px),var(--pm-grey-50) var(--day-px));}

  /* ---- Balken: großzügig, Inhalt füllt die Breite ---- */
  .gantt-bar{position:absolute;height:66px;border-radius:10px;box-sizing:border-box;overflow:hidden;
        display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 16px 0 18px;
        color:#fff;cursor:pointer;z-index:1;
        box-shadow:0 1px 2px rgba(0,0,0,.12),0 8px 20px rgba(0,0,0,.10);
        transition:transform .15s,box-shadow .15s,filter .15s}
  .gantt-bar::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(0,0,0,.06));pointer-events:none}
  .gantt-bar:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(0,0,0,.22);filter:brightness(1.04)}
  .gantt-bar__main{min-width:0;position:relative;z-index:1}
  .gantt-bar__abt{font-family:var(--font-heading);font-weight:700;font-size:16px;letter-spacing:-.01em;
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 1px rgba(0,0,0,.12)}
  .gantt-bar__zeit{font-size:12.5px;opacity:.92;margin-top:2px;white-space:nowrap}
  .gantt-bar__who{display:flex;align-items:center;gap:8px;position:relative;z-index:1;flex:0 0 auto}
  .gantt-bar__who .av{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.25);
        display:grid;place-items:center;font-family:var(--font-heading);font-weight:700;font-size:12px;
        border:1.5px solid rgba(255,255,255,.55)}
  .gantt-bar__who .nm{font-size:13px;font-weight:600;white-space:nowrap}

  .gantt-bar--c1{background:var(--c1)} .gantt-bar--c2{background:var(--c2)}
  .gantt-bar--c3{background:var(--c3)} .gantt-bar--c4{background:var(--c4)} .gantt-bar--c5{background:var(--c5)}
  .gantt-bar.is-past{opacity:.62}
  .gantt-bar.is-current{box-shadow:0 0 0 3px var(--pm-yellow),0 10px 26px rgba(0,0,0,.18);z-index:2}
  .gantt-bar__now{position:absolute;top:9px;left:18px;z-index:2;background:var(--pm-yellow);color:#3A2C00;
        font-family:var(--font-heading);font-weight:700;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;
        padding:3px 9px;border-radius:99px}
  .gantt-bar.is-current .gantt-bar__main{margin-top:14px}

  /* ---- Heute-Linie + Marker ---- */
  .gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--today);z-index:2;pointer-events:none}
  .gantt-today-marker{position:absolute;top:8px;transform:translateX(-50%);z-index:5;
        background:var(--today);color:#fff;font-family:var(--font-heading);font-weight:700;font-size:11px;
        padding:3px 9px;border-radius:99px;white-space:nowrap;box-shadow:0 2px 8px rgba(229,72,77,.4)}

  .hint{padding:12px 22px;font-size:12.5px;color:var(--pm-grey-500);border-top:1px solid var(--pm-grey-100);background:var(--pm-grey-50)}
</style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Mein Abteilungsdurchlauf</h1>
      <div class="legend">
        <span><i style="background:var(--c3)"></i>Aktuell</span>
        <span><i style="background:var(--c1);opacity:.62"></i>Beendet</span>
        <span><i style="background:var(--c4)"></i>Geplant</span>
      </div>
    </div>

    <div class="gantt-panel">
      <div class="gantt-scroll" id="scroll">
        <div class="gantt-grid" id="grid">
          <div class="gantt-header">
            <div class="gantt-header__name-col">2026</div>
            <div class="gantt-header__timeline">
              <div class="gantt-months" id="months"></div>
              <div class="gantt-days" id="days"></div>
            </div>
          </div>
          <div class="gantt-row">
            <div class="gantt-row__info">
              <div class="gantt-row__name">Abteilungen<small>6 Stationen · 2026</small></div>
            </div>
            <div class="gantt-row__timeline" id="timeline"></div>
          </div>
        </div>
      </div>
      <div class="hint">↔ Horizontal scrollen für das ganze Jahr · Balken anklicken für Details</div>
    </div>
  </div>

<script>
  const COLORS=['c1','c2','c3','c4','c5'];
  const STATIONS=[
    { abt:'Mechanische Fertigung', von:'2026-01-06', bis:'2026-02-27', ap:'Thomas Berger',  ini:'TB' },
    { abt:'Montage Großgeräte',    von:'2026-03-02', bis:'2026-04-30', ap:'Sandra Hoffmann', ini:'SH' },
    { abt:'Schweißtechnik',        von:'2026-05-04', bis:'2026-06-30', ap:'Markus Lehmann',  ini:'ML' },
    { abt:'Qualitätssicherung',    von:'2026-07-01', bis:'2026-08-31', ap:'Julia Wagner',    ini:'JW' },
    { abt:'Lager & Logistik',      von:'2026-09-01', bis:'2026-10-16', ap:'Stefan Klein',    ini:'SK' },
    { abt:'Konstruktion / CAD',    von:'2026-10-19', bis:'2026-12-18', ap:'Anja Vogel',      ini:'AV' },
  ];
  const YEAR=2026, HEUTE=new Date(2026,5,19), DAYPX=30;
  const MON=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  const jan1=new Date(YEAR,0,1);
  const numDays=Math.round((new Date(YEAR,11,31)-jan1)/864e5)+1;
  const dayOf=d=>Math.round((d-jan1)/864e5);
  document.getElementById('grid').style.setProperty('--num-days',numDays);
  const fmt=iso=>{const[Y,M,D]=iso.split('-');return `${parseInt(D)}. ${MON[parseInt(M)-1]}`;};

  // Monatskopf
  const months=document.getElementById('months');
  for(let m=0;m<12;m++){
    const dim=new Date(YEAR,m+1,0).getDate();
    const el=document.createElement('div');
    el.className='gantt-month'+([0,3,6,9].includes(m)?' gantt-month--q':'')+(m===HEUTE.getMonth()?' current':'');
    el.style.width=(dim*DAYPX)+'px'; el.textContent=MON[m]+' '+YEAR;
    months.appendChild(el);
  }
  // Tagesraster
  const days=document.getElementById('days');
  for(let m=0;m<12;m++){
    const dim=new Date(YEAR,m+1,0).getDate();
    for(let d=1;d<=dim;d++){
      const date=new Date(YEAR,m,d), dow=date.getDay();
      const el=document.createElement('div');
      el.className='gantt-day'+((dow===0||dow===6)?' gantt-day--weekend':'')+(d===1?' gantt-day--month':'')
                  +(date.getTime()===HEUTE.getTime()?' current':'');
      el.textContent=d; days.appendChild(el);
    }
  }
  // Balken
  const tl=document.getElementById('timeline');
  STATIONS.forEach((s,i)=>{
    const v=new Date(s.von+'T00:00:00'), b=new Date(s.bis+'T00:00:00');
    const past=b<HEUTE, current=v<=HEUTE&&b>=HEUTE;
    const left=dayOf(v)*DAYPX, width=(dayOf(b)-dayOf(v)+1)*DAYPX;
    const bar=document.createElement('div');
    bar.className='gantt-bar gantt-bar--'+COLORS[i%5]+(past?' is-past':current?' is-current':'');
    bar.style.left=(left+3)+'px'; bar.style.width=(width-6)+'px';
    bar.title=`${s.abt} · ${fmt(s.von)} – ${fmt(s.bis)} · ${s.ap}`;
    bar.innerHTML=`
      ${current?'<span class="gantt-bar__now">Aktuell</span>':''}
      <div class="gantt-bar__main">
        <div class="gantt-bar__abt">${s.abt}</div>
        <div class="gantt-bar__zeit">${fmt(s.von)} – ${fmt(s.bis)}</div>
      </div>
      <div class="gantt-bar__who">
        <span class="av">${s.ini}</span><span class="nm">${s.ap}</span>
      </div>`;
    tl.appendChild(bar);
  });
  // Heute-Linie + Marker
  const tx=(dayOf(HEUTE)+0.5)*DAYPX;
  const line=document.createElement('div'); line.className='gantt-today-line'; line.style.left=tx+'px'; tl.appendChild(line);
  const mk=document.createElement('div'); mk.className='gantt-today-marker'; mk.style.left=tx+'px'; mk.textContent='Heute · 19. Juni'; tl.appendChild(mk);
  // auf „Heute" scrollen
  requestAnimationFrame(()=>{ document.getElementById('scroll').scrollLeft=Math.max(0,(dayOf(HEUTE)-4)*DAYPX); });
</script>
</body>
</html>
