<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="preload" href="../Corporate Design/Fonts/librefranklin-bold.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="../Corporate Design/Fonts/librefranklin-light.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="../Corporate Design/Fonts/OpenSans-Variable.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="js/api.js" as="script">
  <title>Anmelden – Berichtsheft | Putzmeister</title>
  <!-- Theme-Init muss VOR den Stylesheets laufen, damit kein Hell/Dunkel-Flash entsteht -->
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/glass.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/theme-hyperspace.css">
  <link rel="stylesheet" href="css/theme-cmd.css">
  <link rel="stylesheet" href="css/theme-candy.css">
  <link rel="stylesheet" href="css/theme-iceland.css">
  <link rel="stylesheet" href="css/theme-silk.css">
  <link rel="stylesheet" href="css/theme-halloween.css">
  <link rel="stylesheet" href="css/themes.css">
</head>
<body class="login-page">

  <!-- Dekorative Brand-Kreise (Tiefe statt flacher Gelb-Fläche) -->
  <span class="login-orb login-orb--1" aria-hidden="true"></span>
  <span class="login-orb login-orb--2" aria-hidden="true"></span>

  <div class="login-card">
    <!-- App-Identität -->
    <div class="login-card__ident">
      <img class="login-card__mark" src="../Corporate Design/Digital Logo_png/Social Logo/400 x 400 px.png" alt="">
      <div>
        <div class="login-card__app">Berichtsheft</div>
        <div class="login-card__sub">Bitte anmelden</div>
      </div>
    </div>

    <!-- Microsoft-SSO (primärer Login-Weg) -->
    <button type="button" class="btn-ms" id="msLoginBtn">
      <svg class="btn-ms__logo" viewBox="0 0 21 21" aria-hidden="true">
        <rect x="1"  y="1"  width="9" height="9" fill="#F25022"/>
        <rect x="11" y="1"  width="9" height="9" fill="#7FBA00"/>
        <rect x="1"  y="11" width="9" height="9" fill="#00A4EF"/>
        <rect x="11" y="11" width="9" height="9" fill="#FFB900"/>
      </svg>
      Mit Microsoft anmelden
    </button>
    <div class="login-sso-hint" id="ssoHint">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 11v5m0-8h.01"/></svg>
      <span>Microsoft-Anmeldung wird aktiviert, sobald Azure AD verbunden ist.</span>
    </div>

    <div class="login-divider"><span>oder</span></div>

    <div class="login-error" id="loginError">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
      <span id="loginErrorText">Ungültige E-Mail oder Passwort.</span>
    </div>

    <form class="login-form" id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">E-Mail-Adresse</label>
        <input type="email" id="email" class="form-control" placeholder="vorname.nachname@putzmeister.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Passwort</label>
        <div class="password-wrap">
          <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="password-toggle" id="passwordToggle" aria-label="Passwort anzeigen">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="login-form__options">
        <label class="checkbox-wrap">
          <input type="checkbox" id="rememberMe">
          <span>Angemeldet bleiben</span>
        </label>
        <span class="login-form__forgot">Passwort vergessen?</span>
      </div>

      <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">Anmelden</button>
    </form>

    <!-- Demo-Logins (standardmäßig eingeklappt – in der Produktiv-Version ausgeblendet) -->
    <div class="login-demo" id="loginDemo">
      <button type="button" class="login-demo__toggle" id="demoToggle" aria-expanded="false" aria-controls="demoList">
        <span class="login-demo__toggle-label">Demo-Zugänge anzeigen</span>
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div class="login-demo__list" id="demoList" hidden>
        <button class="demo-login-btn" data-email="florian.kern@putzmeister.com" data-password="azubi123">
          <div class="avatar avatar--sm">FK</div>
          <div class="demo-login-btn__info">
            <span class="demo-login-btn__name">Florian Kern</span>
            <span class="demo-login-btn__role">Auszubildender · Wöchentliche Ansicht</span>
          </div>
        </button>
        <button class="demo-login-btn" data-email="jonas.becker@putzmeister.com" data-password="azubi123">
          <div class="avatar avatar--sm">JB</div>
          <div class="demo-login-btn__info">
            <span class="demo-login-btn__name">Jonas Becker</span>
            <span class="demo-login-btn__role">Auszubildender · Tägliche Ansicht</span>
          </div>
        </button>
        <button class="demo-login-btn" data-email="lena.mueller@putzmeister.com" data-password="azubi123">
          <div class="avatar avatar--sm">LM</div>
          <div class="demo-login-btn__info">
            <span class="demo-login-btn__name">Lena Müller</span>
            <span class="demo-login-btn__role">Auszubildende · Wöchentliche Ansicht</span>
          </div>
        </button>
        <button class="demo-login-btn" data-email="matthias.fauser@putzmeister.com" data-password="ausbilder123">
          <div class="avatar avatar--sm" style="background:var(--pm-grey-700);color:white;">ML</div>
          <div class="demo-login-btn__info">
            <span class="demo-login-btn__name">Matthias Lengerer</span>
            <span class="demo-login-btn__role">Ausbilder</span>
          </div>
        </button>
        <button class="demo-login-btn" data-email="admin@putzmeister.com" data-password="admin123">
          <div class="avatar avatar--sm" style="background:var(--pm-grey-600);color:white;">AD</div>
          <div class="demo-login-btn__info">
            <span class="demo-login-btn__name">Admin Verwaltung</span>
            <span class="demo-login-btn__role">Administrator</span>
          </div>
        </button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
  <script src="js/react-theme-layer.js"></script>
</body>
</html>
