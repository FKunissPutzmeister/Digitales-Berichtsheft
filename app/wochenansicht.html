<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wochenansicht – Digitales Berichtsheft | Putzmeister</title>
  <!-- Theme-Init muss VOR den Stylesheets laufen, damit kein Hell/Dunkel-Flash entsteht -->
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/wochenansicht.css">
  <link rel="stylesheet" href="https://cdn.quilljs.com/1.3.7/quill.snow.css">
  <link rel="stylesheet" href="css/quill-editor.css">
  <link rel="stylesheet" href="css/glass.css">
  <link rel="stylesheet" href="css/topbar-ds.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="main-wrapper">
    <header class="topbar" id="topbar"></header>
    <main class="main-content" id="mainContent"></main>
  </div>
</div>

<!-- Kommentar-Modal (Ausbilder) -->
<div class="modal-overlay" id="commentModal">
  <div class="modal">
    <div class="modal__header">
      <h3 class="modal__title">Kommentar hinzufügen</h3>
      <button class="modal__close" data-modal-close>
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="width:18px;height:18px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal__body">
      <div class="form-group">
        <label class="form-label">Dein Kommentar</label>
        <textarea id="commentText" class="form-control" rows="4" placeholder="Kommentar eingeben…"></textarea>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn-outline" data-modal-close>Abbrechen</button>
      <button class="lg-btn lg-btn--dark-glass" id="commentSubmitBtn">
        <span class="btn__glass"></span>
        Kommentar speichern
      </button>
    </div>
  </div>
</div>

<!-- Freigabe-Modal -->
<div class="modal-overlay" id="releaseModal">
  <div class="modal">
    <div class="modal__header">
      <h3 class="modal__title">Woche zur Abnahme freigeben?</h3>
      <button class="modal__close" data-modal-close>
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="width:18px;height:18px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal__body">
      <p style="font-size:var(--text-sm);color:var(--pm-grey-600);line-height:var(--lh-relaxed)">
        Die Berichtswoche wird deinem Ausbilder zur Genehmigung vorgelegt. Einträge können danach nicht mehr bearbeitet werden.
      </p>
    </div>
    <div class="modal__footer">
      <button class="btn btn-outline" data-modal-close>Abbrechen</button>
      <button class="lg-btn lg-btn--dark-glass" id="releaseConfirmBtn">
        <span class="btn__glass"></span>
        Freigeben
      </button>
    </div>
  </div>
</div>

<!-- Ablehnen-Modal (Ausbilder) -->
<div class="modal-overlay" id="rejectModal">
  <div class="modal">
    <div class="modal__header">
      <h3 class="modal__title">Bericht zurückgeben</h3>
      <button class="modal__close" data-modal-close>
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="width:18px;height:18px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal__body">
      <div class="form-group">
        <label class="form-label">Begründung</label>
        <textarea id="rejectReason" class="form-control" rows="3" placeholder="Was soll überarbeitet werden?"></textarea>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn-outline" data-modal-close>Abbrechen</button>
      <button class="btn btn-danger" id="rejectConfirmBtn">Zurückgeben</button>
    </div>
  </div>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="js/data.js"></script>
<script src="js/topbar-ds.js"></script>
<script src="js/app.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/wochenansicht.js"></script>
</body>
</html>
